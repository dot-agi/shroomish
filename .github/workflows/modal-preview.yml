name: Modal Preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: modal-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  detect-changes:
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      deploy_backend: ${{ steps.compute.outputs.deploy_backend }}
      run_migrations: ${{ steps.compute.outputs.run_migrations }}
      any_change: ${{ steps.compute.outputs.any_change }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # For each component (backend, migrations) we find the most recent
      # workflow run on this PR branch whose corresponding step finished
      # with conclusion=success, and use that run's head_sha as the diff
      # base. If a prior push failed mid-deploy, its broken state is not
      # recorded as a successful base, so the next push will still
      # redeploy the affected component.
      - name: Look up last-successful component SHAs
        id: last_deployed
        if: github.event.action == 'synchronize'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER_REPO: ${{ github.repository }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: python "$GITHUB_WORKSPACE/.github/scripts/preview/find_last_deploys.py"

      - name: Detect backend code changes since last successful backend deploy
        id: filter_backend
        if: github.event.action == 'synchronize' && steps.last_deployed.outputs.backend_base != ''
        uses: dorny/paths-filter@v3
        with:
          base: ${{ steps.last_deployed.outputs.backend_base }}
          ref: ${{ github.event.pull_request.head.sha }}
          filters: |
            changed:
              - 'backend/**'
              - '!backend/alembic/**'
              - '!backend/**/*.md'
              - 'oddish/**'
              - '!oddish/alembic/**'
              - '!oddish/**/*.md'

      - name: Detect migration changes since last successful migration run
        id: filter_migrations
        if: github.event.action == 'synchronize' && steps.last_deployed.outputs.migrations_base != ''
        uses: dorny/paths-filter@v3
        with:
          base: ${{ steps.last_deployed.outputs.migrations_base }}
          ref: ${{ github.event.pull_request.head.sha }}
          filters: |
            changed:
              - 'backend/alembic/**'
              - 'oddish/alembic/**'

      # Workflow / script changes are diffed against the previous push,
      # not a per-component base, because they can affect any component.
      - name: Detect workflow or preview-script changes since previous push
        id: filter_workflow
        if: github.event.action == 'synchronize'
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event.before }}
          ref: ${{ github.event.pull_request.head.sha }}
          filters: |
            changed:
              - '.github/workflows/modal-preview.yml'
              - '.github/scripts/preview/**'

      - name: Compute deployment plan
        id: compute
        env:
          EVENT_ACTION: ${{ github.event.action }}
          BACKEND_BASE: ${{ steps.last_deployed.outputs.backend_base }}
          MIGRATIONS_BASE: ${{ steps.last_deployed.outputs.migrations_base }}
          BACKEND_CHANGED: ${{ steps.filter_backend.outputs.changed }}
          MIGRATIONS_CHANGED: ${{ steps.filter_migrations.outputs.changed }}
          WORKFLOW_CHANGED: ${{ steps.filter_workflow.outputs.changed }}
        run: bash "$GITHUB_WORKSPACE/.github/scripts/preview/compute_deployment_plan.sh"

  deploy-preview:
    needs: detect-changes
    if: needs.detect-changes.outputs.any_change == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      MODAL_ENVIRONMENT: preview
      MODAL_APP_NAME: oddish-pr-${{ github.event.pull_request.number }}
      MODAL_SECRET_ENVIRONMENT: main
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_GIT_BRANCH: ${{ github.event.pull_request.head.ref }}
      VERCEL_GIT_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
      ODDISH_MODAL_API_MIN_CONTAINERS: "0"
      ODDISH_MODAL_API_BUFFER_CONTAINERS: "0"
      ODDISH_MODAL_API_MAX_CONTAINERS: "2"
      ODDISH_MODAL_WORKER_MIN_CONTAINERS: "0"
      ODDISH_MODAL_WORKER_BUFFER_CONTAINERS: "0"
      ODDISH_MODAL_WORKER_MAX_CONTAINERS: "2"
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Sync backend dependencies
        run: uv sync --frozen

      - name: Stop previous preview Modal app
        # The Supabase branch step (next) rotates the per-PR DB password
        # every deploy. If the previously-deployed Modal containers are
        # still running with the prior password, their reconnects flood
        # Supavisor with auth failures and trip its per-project circuit
        # breaker — which then bounces our own smoke-test seconds later.
        # Stop the old app first so the rotation only invalidates
        # credentials nothing is using.
        if: ${{ needs.detect-changes.outputs.deploy_backend == 'true' }}
        continue-on-error: true
        # `|| true` so a fresh PR (no app to stop) is cleanly green
        # instead of red-with-continue-on-error.
        run: uv run modal app stop --env "$MODAL_ENVIRONMENT" "$MODAL_APP_NAME" || true

      - name: Ensure Supabase preview branch with prod data
        id: supabase_branch
        working-directory: ${{ github.workspace }}
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: .github/scripts/preview/wait_for_supabase_branch.sh

      - name: Apply Alembic migrations to preview branch
        if: ${{ needs.detect-changes.outputs.run_migrations == 'true' || steps.supabase_branch.outputs.branch_was_created == 'true' }}
        run: uv run python "$GITHUB_WORKSPACE/.github/scripts/preview/bootstrap_preview_db.py"

      - name: Cancel cloned-prod in-flight work
        # Only on a fresh branch — once the dev has interacted with the
        # preview, their own pending work shouldn't get nuked on every
        # subsequent push.
        if: steps.supabase_branch.outputs.branch_was_created == 'true'
        run: |
          psql "${ODDISH_DATABASE_URL/+asyncpg/}" <<'SQL'
          UPDATE worker_jobs
             SET status = 'CANCELLED'
           WHERE status IN ('QUEUED', 'RUNNING', 'RETRYING', 'BLOCKED');
          UPDATE tasks
             SET status = 'failed'
           WHERE status IN ('pending', 'running', 'analyzing', 'verdict_pending');
          UPDATE trials
             SET status = 'failed'
           WHERE status IN ('pending', 'queued', 'running', 'retrying');
          SQL

      - name: Create per-PR Modal database secret
        if: ${{ needs.detect-changes.outputs.deploy_backend == 'true' || steps.supabase_branch.outputs.branch_was_created == 'true' }}
        run: |
          uv run modal secret create \
            --env "$MODAL_ENVIRONMENT" --force \
            "$MODAL_APP_NAME-db" \
            "ODDISH_DATABASE_URL=$ODDISH_DATABASE_URL"

      - name: Deploy preview backend
        id: deploy_modal
        if: ${{ needs.detect-changes.outputs.deploy_backend == 'true' || steps.supabase_branch.outputs.branch_was_created == 'true' }}
        run: |
          deploy_log="$(mktemp)"
          uv run modal deploy deploy.py 2>&1 | tee "$deploy_log"
          modal_api_url="$(python "$GITHUB_WORKSPACE/.github/scripts/preview/extract_modal_api_url.py" "$deploy_log")"
          echo "modal_api_url=$modal_api_url" >> "$GITHUB_OUTPUT"

      - name: Wait for preview backend readiness
        id: readiness
        if: ${{ steps.deploy_modal.outcome == 'success' }}
        run: python "$GITHUB_WORKSPACE/.github/scripts/preview/wait_for_modal_ready.py" "${{ steps.deploy_modal.outputs.modal_api_url }}"

      - name: Dump Modal preview logs on deploy or readiness failure
        # Also fire when `modal deploy` itself crashes — that's where
        # the container-side stack trace lives, and it's the most
        # diagnostic moment.
        if: ${{ failure() && (steps.deploy_modal.conclusion == 'failure' || steps.readiness.conclusion == 'failure') }}
        continue-on-error: true
        # `modal app logs` streams forever; bound it. `--env` is needed
        # because the CLI ignores MODAL_ENVIRONMENT for this subcommand.
        run: timeout --preserve-status 45s uv run modal app logs --env "$MODAL_ENVIRONMENT" --timestamps "$MODAL_APP_NAME" 2>&1 | tail -300 || true

      # Vercel setup runs only on the first deploy (newly-created Supabase
      # branch). MODAL_APP_NAME is keyed on the PR number, so the Modal URL
      # is stable across subsequent pushes — Vercel's GitHub integration
      # auto-deploys those with the already-set NEXT_PUBLIC_API_URL.
      - name: Install Node
        if: ${{ steps.supabase_branch.outputs.branch_was_created == 'true' && env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        if: ${{ steps.supabase_branch.outputs.branch_was_created == 'true' && env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        run: npm install --global vercel@latest

      - name: Link Vercel project
        if: ${{ steps.supabase_branch.outputs.branch_was_created == 'true' && env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        working-directory: frontend
        run: vercel pull --yes --environment=preview --git-branch="$VERCEL_GIT_BRANCH" --token="$VERCEL_TOKEN"

      - name: Point Vercel preview to Modal preview
        if: ${{ steps.supabase_branch.outputs.branch_was_created == 'true' && env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        working-directory: frontend
        env:
          MODAL_API_URL: ${{ steps.deploy_modal.outputs.modal_api_url }}
        # NEXT_PUBLIC_API_URL is the only backend URL the frontend reads
        # (frontend/src/lib/backend-config.ts). --no-sensitive keeps it
        # visible in the dashboard for debugging.
        run: printf '%s' "$MODAL_API_URL" | vercel env add NEXT_PUBLIC_API_URL preview "$VERCEL_GIT_BRANCH" --force --no-sensitive --token="$VERCEL_TOKEN"

      - name: Redeploy Vercel preview with updated env
        id: redeploy_vercel
        if: ${{ steps.supabase_branch.outputs.branch_was_created == 'true' && env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        run: python "$GITHUB_WORKSPACE/.github/scripts/preview/redeploy_vercel.py"

      - name: Summarize preview URLs
        if: ${{ always() }}
        run: |
          {
            echo "## Preview deployment"
            echo
            if [ -n "${{ steps.deploy_modal.outputs.modal_api_url }}" ]; then
              echo "- Modal API: ${{ steps.deploy_modal.outputs.modal_api_url }} (redeployed)"
            else
              echo "- Modal API: not redeployed this push (no backend changes since last successful deploy)"
            fi
            if [ -n "${{ steps.redeploy_vercel.outputs.preview_url }}" ]; then
              echo "- Vercel preview: ${{ steps.redeploy_vercel.outputs.preview_url }} (force-redeployed)"
            else
              echo "- Vercel preview: handled by Vercel's git integration"
            fi
            if [ -n "${{ steps.supabase_branch.outputs.branch_ref }}" ]; then
              echo "- Supabase branch: \`${{ steps.supabase_branch.outputs.branch_ref }}\`"
            fi
            echo "- PR head SHA: ${{ github.event.pull_request.head.sha }}"
            echo "- Plan: deploy_backend=\`${{ needs.detect-changes.outputs.deploy_backend }}\` run_migrations=\`${{ needs.detect-changes.outputs.run_migrations }}\` branch_was_created=\`${{ steps.supabase_branch.outputs.branch_was_created }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  stop-preview:
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      MODAL_ENVIRONMENT: preview
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_GIT_BRANCH: ${{ github.event.pull_request.head.ref }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Modal
        run: python -m pip install modal

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Stop preview backend
        continue-on-error: true
        run: modal app stop oddish-pr-${{ github.event.pull_request.number }}

      - name: Delete per-PR Modal database secret
        continue-on-error: true
        run: modal secret delete --env "$MODAL_ENVIRONMENT" oddish-pr-${{ github.event.pull_request.number }}-db

      - name: Delete Supabase preview branch
        continue-on-error: true
        env:
          BRANCH_NAME: pr-${{ github.event.pull_request.number }}
        run: |
          ids=$(supabase branches list --project-ref "$SUPABASE_PROJECT_REF" -o json \
            | jq -r --arg name "$BRANCH_NAME" '
                .[] | select(.persistent != true)
                    | select(.name == $name)
                    | .id')
          for id in $ids; do
            echo "deleting Supabase branch $id"
            supabase branches delete "$id" --project-ref "$SUPABASE_PROJECT_REF" || true
          done

      - name: Install Node
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        run: npm install --global vercel@latest

      - name: Link Vercel project
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        working-directory: frontend
        run: vercel pull --yes --environment=preview --git-branch="$VERCEL_GIT_BRANCH" --token="$VERCEL_TOKEN"

      - name: Remove Vercel preview overrides
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        working-directory: frontend
        run: vercel env rm NEXT_PUBLIC_API_URL preview "$VERCEL_GIT_BRANCH" --yes --token="$VERCEL_TOKEN" || true
